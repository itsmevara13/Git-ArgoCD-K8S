replicaCount: 1

image:
  repository: nginx
  tag: "1.25"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: false
  className: nginx
  host: myapp.local
  path: /
  pathType: Prefix
  tls: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

configmap:
  APP_ENV: development
  LOG_LEVEL: debug
  APP_PORT: "80"

livenessProbe:
  path: /
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 10

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "80"
  prometheus.io/path: "/metrics"

nodeSelector: {}
tolerations: []
affinity: {}